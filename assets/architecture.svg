<svg width="800" height="700" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>WhatsApp Freelance Outreach Bot — System Architecture</title>
  <defs>
    <pattern id="dots2" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1a221a" opacity="0.7"/>
    </pattern>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff9d" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff4d4d" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="700" fill="#0a0f0a" rx="10"/>
  <rect width="800" height="700" fill="url(#dots2)" rx="10"/>

  <!-- Header -->
  <rect width="800" height="68" fill="#0d150d" rx="10"/>
  <rect y="58" width="800" height="10" fill="#0d150d"/>
  <rect x="24" y="20" width="3" height="30" fill="#00ff9d" rx="1"/>
  <text x="36" y="36" font-family="'Courier New',monospace" font-size="15" font-weight="700" fill="#e8f5e8" letter-spacing="1">SYSTEM ARCHITECTURE</text>
  <text x="36" y="54" font-family="'Courier New',monospace" font-size="10" fill="#3a6a3a" letter-spacing="0.5">// WhatsApp Freelance Outreach Bot · module dependency map</text>
  <line x1="0" y1="68" x2="800" y2="68" stroke="#1a2a1a" stroke-width="1.5"/>

  <!-- Spine -->
  <line x1="400" y1="95" x2="400" y2="648" stroke="url(#spineGrad)" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ─── ROW 1: contacts.csv ─── -->
  <text x="382" y="122" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#00ff9d" text-anchor="end">contacts.csv</text>
  <text x="382" y="137" font-family="'Courier New',monospace" font-size="9" fill="#3a6a3a" text-anchor="end">name · number · business_type</text>
  <text x="382" y="150" font-family="'Courier New',monospace" font-size="9" fill="#3a6a3a" text-anchor="end">notable_info · has_website</text>
  <rect x="390" y="124" width="20" height="20" rx="3" fill="#0a0f0a" stroke="#00ff9d" stroke-width="1.5"/>
  <text x="400" y="138" font-family="'Courier New',monospace" font-size="9" fill="#00ff9d" text-anchor="middle">▶</text>
  <!-- right -->
  <rect x="422" y="118" width="22" height="28" rx="2" fill="none" stroke="#00ff9d" stroke-width="1.2"/>
  <line x1="427" y1="126" x2="439" y2="126" stroke="#00ff9d" stroke-width="1"/>
  <line x1="427" y1="130" x2="439" y2="130" stroke="#00ff9d" stroke-width="1"/>
  <line x1="427" y1="134" x2="435" y2="134" stroke="#00ff9d" stroke-width="1"/>
  <text x="452" y="129" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#00ff9d">input_file</text>
  <text x="452" y="143" font-family="'Courier New',monospace" font-size="9" fill="#3a6a3a">your outreach list</text>

  <!-- ─── ROW 2: csvLoader + stateStore ─── -->
  <text x="382" y="202" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#00e5ff" text-anchor="end">csvLoader.js</text>
  <text x="382" y="217" font-family="'Courier New',monospace" font-size="9" fill="#2a5a6a" text-anchor="end">normalize · validate · dedupe</text>
  <rect x="390" y="200" width="20" height="20" rx="3" fill="#0a0f0a" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="400" y="214" font-family="'Courier New',monospace" font-size="9" fill="#00e5ff" text-anchor="middle">▶</text>
  <text x="452" y="207" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#00e5ff">stateStore.js</text>
  <text x="452" y="221" font-family="'Courier New',monospace" font-size="9" fill="#2a5a6a">mutex lock · state.json</text>

  <!-- ─── ROW 3: waClient ─── -->
  <text x="382" y="286" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#ffb300" text-anchor="end">waClient.js</text>
  <text x="382" y="301" font-family="'Courier New',monospace" font-size="9" fill="#5a4a00" text-anchor="end">QR auth · LocalAuth session</text>
  <text x="382" y="314" font-family="'Courier New',monospace" font-size="9" fill="#5a4a00" text-anchor="end">Puppeteer headless bridge</text>
  <rect x="390" y="284" width="20" height="20" rx="3" fill="#0a0f0a" stroke="#ffb300" stroke-width="1.5"/>
  <text x="400" y="298" font-family="'Courier New',monospace" font-size="9" fill="#ffb300" text-anchor="middle">▶</text>
  <text x="452" y="291" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#ffb300">WA client</text>
  <text x="452" y="305" font-family="'Courier New',monospace" font-size="9" fill="#5a4a00">whatsapp-web.js</text>

  <!-- ─── ROW 4: scheduler + templateEngine ─── -->
  <text x="382" y="372" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#bf80ff" text-anchor="end">scheduler.js</text>
  <text x="382" y="387" font-family="'Courier New',monospace" font-size="9" fill="#4a2a6a" text-anchor="end">daily cap · 45–90s random delay</text>
  <text x="382" y="400" font-family="'Courier New',monospace" font-size="9" fill="#4a2a6a" text-anchor="end">isRunning guard</text>
  <rect x="390" y="370" width="20" height="20" rx="3" fill="#0a0f0a" stroke="#bf80ff" stroke-width="1.5"/>
  <text x="400" y="384" font-family="'Courier New',monospace" font-size="9" fill="#bf80ff" text-anchor="middle">▶</text>
  <text x="452" y="377" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#bf80ff">templateEngine.js</text>
  <text x="452" y="391" font-family="'Courier New',monospace" font-size="9" fill="#4a2a6a">AI message gen · OpenRouter</text>

  <!-- ─── ROW 5: replyListener + aiScorer ─── -->
  <text x="382" y="458" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#ff9d5c" text-anchor="end">replyListener.js</text>
  <text x="382" y="473" font-family="'Courier New',monospace" font-size="9" fill="#6a3a1a" text-anchor="end">CSV-scoped · skips forwarded</text>
  <text x="382" y="486" font-family="'Courier New',monospace" font-size="9" fill="#6a3a1a" text-anchor="end">tracks conversation history</text>
  <rect x="390" y="456" width="20" height="20" rx="3" fill="#0a0f0a" stroke="#ff9d5c" stroke-width="1.5"/>
  <text x="400" y="470" font-family="'Courier New',monospace" font-size="9" fill="#ff9d5c" text-anchor="middle">▶</text>
  <text x="452" y="463" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#ff9d5c">aiScorer.js</text>
  <text x="452" y="477" font-family="'Courier New',monospace" font-size="9" fill="#6a3a1a">HOT / WARM / COLD · 5× retry</text>

  <!-- ─── ROW 6: forwardEngine ─── -->
  <text x="382" y="552" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#ff4d4d" text-anchor="end">forwardEngine.js</text>
  <text x="382" y="567" font-family="'Courier New',monospace" font-size="9" fill="#6a1a1a" text-anchor="end">HOT leads only</text>
  <text x="382" y="580" font-family="'Courier New',monospace" font-size="9" fill="#6a1a1a" text-anchor="end">next-step suggestion · one-shot</text>
  <rect x="390" y="550" width="20" height="20" rx="3" fill="#0a0f0a" stroke="#ff4d4d" stroke-width="1.5"/>
  <text x="400" y="564" font-family="'Courier New',monospace" font-size="9" fill="#ff4d4d" text-anchor="middle">▶</text>
  <text x="452" y="557" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#ff4d4d">designated number</text>
  <text x="452" y="571" font-family="'Courier New',monospace" font-size="9" fill="#6a1a1a">full context · chat history</text>

  <!-- Legend -->
  <line x1="0" y1="622" x2="800" y2="622" stroke="#1a2a1a" stroke-width="1"/>
  <text x="24" y="638" font-family="'Courier New',monospace" font-size="8" fill="#2a4a2a" letter-spacing="1">LAYERS //</text>
  <rect x="96" y="629" width="8" height="8" rx="1" fill="#00ff9d"/>
  <text x="108" y="637" font-family="'Courier New',monospace" font-size="8" fill="#3a6a3a">input</text>
  <rect x="148" y="629" width="8" height="8" rx="1" fill="#00e5ff"/>
  <text x="160" y="637" font-family="'Courier New',monospace" font-size="8" fill="#3a6a3a">data</text>
  <rect x="196" y="629" width="8" height="8" rx="1" fill="#ffb300"/>
  <text x="208" y="637" font-family="'Courier New',monospace" font-size="8" fill="#3a6a3a">transport</text>
  <rect x="264" y="629" width="8" height="8" rx="1" fill="#bf80ff"/>
  <text x="276" y="637" font-family="'Courier New',monospace" font-size="8" fill="#3a6a3a">outreach</text>
  <rect x="336" y="629" width="8" height="8" rx="1" fill="#ff9d5c"/>
  <text x="348" y="637" font-family="'Courier New',monospace" font-size="8" fill="#3a6a3a">intelligence</text>
  <rect x="416" y="629" width="8" height="8" rx="1" fill="#ff4d4d"/>
  <text x="428" y="637" font-family="'Courier New',monospace" font-size="8" fill="#3a6a3a">output</text>

  <!-- corner tag -->
  <text x="756" y="690" font-family="'Courier New',monospace" font-size="8" fill="#1a2a1a" text-anchor="end">arch_v2.svg</text>
</svg>

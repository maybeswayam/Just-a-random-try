<svg width="800" height="700" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>WhatsApp Real Estate Bot — System Architecture</title>
  <desc>Module flow from contacts.csv through csvLoader, stateStore, waClient, scheduler, templateEngine, replyListener, aiScorer, and forwardEngine to the designated number.</desc>

  <!-- Background -->
  <rect width="800" height="700" fill="#0d1117" rx="12"/>

  <!-- Header -->
  <!-- WA icon approximate -->
  <circle cx="36" cy="34" r="11" fill="none" stroke="#25D366" stroke-width="1.8"/>
  <path d="M30 34 Q30 28 36 28 Q42 28 42 34 Q42 38 39 40 L36 41 L33 42 L34 40 Q30 38 30 34Z" fill="none" stroke="#25D366" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="54" y="40" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#e6edf3">System Architecture</text>
  <text x="54" y="58" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681">WhatsApp Real Estate Outreach Bot — module flow</text>

  <!-- Divider -->
  <line x1="24" y1="72" x2="776" y2="72" stroke="#21262d" stroke-width="1"/>

  <!-- Spine -->
  <line x1="400" y1="100" x2="400" y2="648" stroke="#21262d" stroke-width="2"/>

  <!-- ─── ROW 1: contacts.csv ─── -->
  <!-- Left label -->
  <text x="370" y="124" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#58a6ff" text-anchor="end">contacts.csv</text>
  <text x="370" y="140" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">name · number · buyer/seller</text>
  <text x="370" y="154" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">property · location</text>
  <!-- Node -->
  <circle cx="400" cy="136" r="10" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>
  <circle cx="400" cy="136" r="4" fill="#58a6ff"/>
  <!-- Right icon: file -->
  <g transform="translate(420,120)">
    <path d="M4 2H14L20 8V26H4V2Z" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round"/>
    <polyline points="14,2 14,8 20,8" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="8" y1="14" x2="16" y2="14" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="8" y1="18" x2="16" y2="18" stroke="#58a6ff" stroke-width="1.5"/>
  </g>
  <text x="450" y="130" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#58a6ff">Input file</text>
  <text x="450" y="146" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681">Your outreach list</text>

  <!-- ─── ROW 2: csvLoader + stateStore ─── -->
  <!-- Left: stateStore icon (pulse) -->
  <g transform="translate(330,182)">
    <polyline points="0,10 4,10 7,2 11,18 15,10 19,10 22,10" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <text x="320" y="200" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#3fb950" text-anchor="end">csvLoader.js</text>
  <text x="320" y="216" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">Normalize numbers · validate</text>
  <text x="320" y="230" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">Dedupe contacts</text>
  <!-- Node -->
  <circle cx="400" cy="212" r="10" fill="#0d1117" stroke="#3fb950" stroke-width="2.5"/>
  <circle cx="400" cy="212" r="4" fill="#3fb950"/>
  <!-- Right icon: database -->
  <g transform="translate(420,196)">
    <ellipse cx="12" cy="5" rx="9" ry="3" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  </g>
  <text x="450" y="206" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#3fb950">stateStore.js</text>
  <text x="450" y="222" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681">Async write lock · state.json</text>

  <!-- ─── ROW 3: waClient ─── -->
  <text x="370" y="286" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#d2a8ff" text-anchor="end">waClient.js</text>
  <text x="370" y="302" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">QR auth on first run</text>
  <text x="370" y="316" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">LocalAuth session persists</text>
  <!-- Node -->
  <circle cx="400" cy="298" r="10" fill="#0d1117" stroke="#d2a8ff" stroke-width="2.5"/>
  <circle cx="400" cy="298" r="4" fill="#d2a8ff"/>
  <!-- Right icon: whatsapp bubble -->
  <g transform="translate(420,282)">
    <path d="M3 21l1.9-5.7A8.5 8.5 0 1 1 12 20.5h-.5L3 21z" fill="none" stroke="#d2a8ff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <text x="450" y="292" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#d2a8ff">WhatsApp client</text>
  <text x="450" y="308" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681">whatsapp-web.js bridge</text>

  <!-- ─── ROW 4: scheduler ─── -->
  <!-- Left: clock icon -->
  <g transform="translate(330,358)">
    <circle cx="12" cy="12" r="10" fill="none" stroke="#e3b341" stroke-width="1.5"/>
    <polyline points="12,6 12,12 16,14" fill="none" stroke="#e3b341" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="320" y="374" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#e3b341" text-anchor="end">scheduler.js</text>
  <text x="320" y="390" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">isRunning guard · daily cap</text>
  <text x="320" y="404" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">45–90s random delay</text>
  <!-- Node -->
  <circle cx="400" cy="386" r="10" fill="#0d1117" stroke="#e3b341" stroke-width="2.5"/>
  <circle cx="400" cy="386" r="4" fill="#e3b341"/>
  <!-- Right icon: chat bubble -->
  <g transform="translate(420,370)">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="none" stroke="#e3b341" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <text x="450" y="380" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#e3b341">templateEngine.js</text>
  <text x="450" y="396" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681">4 message variants · random pick</text>

  <!-- ─── ROW 5: replyListener + aiScorer ─── -->
  <!-- Left: refresh icon -->
  <g transform="translate(334,456)">
    <polyline points="1,4 1,10 7,10" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3.51 15a9 9 0 1 0 .49-3.51" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="322" y="468" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#f0883e" text-anchor="end">replyListener.js</text>
  <text x="322" y="484" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">CSV-scoped only</text>
  <text x="322" y="498" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">Skips already-forwarded leads</text>
  <!-- Node -->
  <circle cx="400" cy="476" r="10" fill="#0d1117" stroke="#f0883e" stroke-width="2.5"/>
  <circle cx="400" cy="476" r="4" fill="#f0883e"/>
  <!-- Right icon: lightning bolt -->
  <g transform="translate(420,460)">
    <polygon points="13,2 3,14 12,14 11,22 21,10 12,10" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <text x="450" y="470" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#f0883e">aiScorer.js</text>
  <text x="450" y="486" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681">OpenRouter · 3× retry · HOT/WARM/COLD</text>

  <!-- ─── ROW 6: forwardEngine ─── -->
  <text x="370" y="558" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#f85149" text-anchor="end">forwardEngine.js</text>
  <text x="370" y="574" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">HOT leads only</text>
  <text x="370" y="588" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681" text-anchor="end">One forward per contact, ever</text>
  <!-- Node -->
  <circle cx="400" cy="566" r="10" fill="#0d1117" stroke="#f85149" stroke-width="2.5"/>
  <circle cx="400" cy="566" r="4" fill="#f85149"/>
  <!-- Right icon: phone -->
  <g transform="translate(420,550)">
    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.45 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.13.97.37 1.92.72 2.83a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.91.35 1.86.59 2.83.72A2 2 0 0 1 21.73 16.92z" fill="none" stroke="#f85149" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <text x="450" y="560" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#f85149">Designated number</text>
  <text x="450" y="576" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6e7681">Clean summary · full convo context</text>

  <!-- ─── Legend ─── -->
  <line x1="24" y1="620" x2="776" y2="620" stroke="#21262d" stroke-width="1"/>
  <!-- dots -->
  <circle cx="192" cy="648" r="5" fill="#58a6ff"/>
  <text x="202" y="652" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681">Input</text>
  <circle cx="252" cy="648" r="5" fill="#3fb950"/>
  <text x="262" y="652" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681">Data layer</text>
  <circle cx="326" cy="648" r="5" fill="#d2a8ff"/>
  <text x="336" y="652" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681">WhatsApp</text>
  <circle cx="404" cy="648" r="5" fill="#e3b341"/>
  <text x="414" y="652" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681">Outreach</text>
  <circle cx="472" cy="648" r="5" fill="#f0883e"/>
  <text x="482" y="652" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681">Intelligence</text>
  <circle cx="552" cy="648" r="5" fill="#f85149"/>
  <text x="562" y="652" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681">Output</text>
</svg>

<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Contact lifecycle — state flow</title>
  <desc>A contact moves from PENDING to SENT to REPLIED to SCORED, then either FORWARDED (HOT) or IGNORED (WARM/COLD)</desc>

  <rect width="800" height="160" fill="#0d1117" rx="12"/>

  <!-- Header -->
  <text x="24" y="28" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681" letter-spacing="1">CONTACT LIFECYCLE</text>
  <line x1="24" y1="36" x2="776" y2="36" stroke="#21262d" stroke-width="1"/>

  <!-- PENDING -->
  <rect x="24" y="54" width="90" height="36" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="69" y="76" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">PENDING</text>
  <text x="69" y="108" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">added to CSV</text>

  <!-- Arrow -->
  <line x1="114" y1="72" x2="144" y2="72" stroke="#30363d" stroke-width="1.5"/>
  <polyline points="138,68 144,72 138,76" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- SENT -->
  <rect x="146" y="54" width="90" height="36" rx="8" fill="#0d2a14" stroke="#3fb950" stroke-width="1.5"/>
  <text x="191" y="76" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#3fb950" text-anchor="middle">SENT</text>
  <text x="191" y="108" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">outreach sent</text>

  <!-- Arrow -->
  <line x1="236" y1="72" x2="266" y2="72" stroke="#30363d" stroke-width="1.5"/>
  <polyline points="260,68 266,72 260,76" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- REPLIED -->
  <rect x="268" y="54" width="90" height="36" rx="8" fill="#1a1a2e" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="313" y="76" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#d2a8ff" text-anchor="middle">REPLIED</text>
  <text x="313" y="108" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">reply received</text>

  <!-- Arrow -->
  <line x1="358" y1="72" x2="388" y2="72" stroke="#30363d" stroke-width="1.5"/>
  <polyline points="382,68 388,72 382,76" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- SCORED -->
  <rect x="390" y="54" width="90" height="36" rx="8" fill="#1f1a00" stroke="#e3b341" stroke-width="1.5"/>
  <text x="435" y="76" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#e3b341" text-anchor="middle">SCORED</text>
  <text x="435" y="108" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">AI verdict</text>

  <!-- Fork line up and down -->
  <line x1="480" y1="72" x2="510" y2="72" stroke="#30363d" stroke-width="1.5"/>
  <line x1="510" y1="50" x2="510" y2="116" stroke="#30363d" stroke-width="1.5"/>

  <!-- Arrow to FORWARDED (top) -->
  <line x1="510" y1="58" x2="540" y2="58" stroke="#30363d" stroke-width="1.5"/>
  <polyline points="534,54 540,58 534,62" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- FORWARDED -->
  <rect x="542" y="40" width="110" height="36" rx="8" fill="#2d0f0f" stroke="#f85149" stroke-width="1.5"/>
  <text x="597" y="62" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#f85149" text-anchor="middle">FORWARDED ✓</text>
  <text x="597" y="92" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#f0883e" text-anchor="middle">HOT lead alerted</text>

  <!-- Arrow to IGNORED (bottom) -->
  <line x1="510" y1="108" x2="540" y2="108" stroke="#30363d" stroke-width="1.5"/>
  <polyline points="534,104 540,108 534,112" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- IGNORED -->
  <rect x="542" y="90" width="110" height="36" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="597" y="112" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#6e7681" text-anchor="middle">IGNORED</text>
  <text x="597" y="142" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">WARM / COLD</text>

  <!-- Labels on fork -->
  <text x="526" y="54" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">HOT</text>
  <text x="526" y="122" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">COLD</text>
</svg>

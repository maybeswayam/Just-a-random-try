<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Contact lifecycle — state flow</title>
  <defs>
    <pattern id="dots3" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1a221a" opacity="0.7"/>
    </pattern>
  </defs>

  <rect width="800" height="160" fill="#0a0f0a" rx="10"/>
  <rect width="800" height="160" fill="url(#dots3)" rx="10"/>

  <!-- Header -->
  <rect x="24" y="14" width="3" height="16" fill="#00ff9d" rx="1"/>
  <text x="34" y="26" font-family="'Courier New',monospace" font-size="9" fill="#3a6a3a" letter-spacing="2">CONTACT_LIFECYCLE</text>
  <line x1="24" y1="38" x2="776" y2="38" stroke="#1a2a1a" stroke-width="1"/>

  <!-- PENDING -->
  <rect x="24" y="52" width="88" height="34" rx="4" fill="#0d150d" stroke="#2a4a2a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="68" y="73" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#3a6a3a" text-anchor="middle">PENDING</text>
  <text x="68" y="104" font-family="'Courier New',monospace" font-size="8" fill="#2a4a2a" text-anchor="middle">added to csv</text>

  <!-- Arrow -->
  <line x1="112" y1="69" x2="138" y2="69" stroke="#2a4a2a" stroke-width="1.5"/>
  <polyline points="133,65 139,69 133,73" fill="none" stroke="#2a4a2a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- SENT -->
  <rect x="140" y="52" width="88" height="34" rx="4" fill="#0a1f0a" stroke="#00ff9d" stroke-width="1.5"/>
  <text x="184" y="73" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#00ff9d" text-anchor="middle">SENT</text>
  <text x="184" y="104" font-family="'Courier New',monospace" font-size="8" fill="#3a6a3a" text-anchor="middle">msg delivered</text>

  <!-- Arrow -->
  <line x1="228" y1="69" x2="254" y2="69" stroke="#2a4a2a" stroke-width="1.5"/>
  <polyline points="249,65 255,69 249,73" fill="none" stroke="#2a4a2a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- REPLIED -->
  <rect x="256" y="52" width="88" height="34" rx="4" fill="#00101f" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="300" y="73" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#00e5ff" text-anchor="middle">REPLIED</text>
  <text x="300" y="104" font-family="'Courier New',monospace" font-size="8" fill="#2a5a6a" text-anchor="middle">reply tracked</text>

  <!-- Arrow -->
  <line x1="344" y1="69" x2="370" y2="69" stroke="#2a4a2a" stroke-width="1.5"/>
  <polyline points="365,65 371,69 365,73" fill="none" stroke="#2a4a2a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- SCORED -->
  <rect x="372" y="52" width="88" height="34" rx="4" fill="#1a1400" stroke="#ffb300" stroke-width="1.5"/>
  <text x="416" y="73" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#ffb300" text-anchor="middle">SCORED</text>
  <text x="416" y="104" font-family="'Courier New',monospace" font-size="8" fill="#5a4a00" text-anchor="middle">AI verdict</text>

  <!-- Fork -->
  <line x1="460" y1="69" x2="488" y2="69" stroke="#2a4a2a" stroke-width="1.5"/>
  <line x1="488" y1="48" x2="488" y2="112" stroke="#2a4a2a" stroke-width="1.5"/>

  <!-- HOT branch -->
  <line x1="488" y1="56" x2="510" y2="56" stroke="#ff4d4d" stroke-width="1.5"/>
  <polyline points="505,52 511,56 505,60" fill="none" stroke="#ff4d4d" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="494" y="50" font-family="'Courier New',monospace" font-size="7" fill="#ff4d4d">HOT</text>

  <!-- FORWARDED -->
  <rect x="512" y="40" width="116" height="34" rx="4" fill="#1f0a0a" stroke="#ff4d4d" stroke-width="1.5"/>
  <text x="570" y="61" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#ff4d4d" text-anchor="middle">FORWARDED ✓</text>
  <text x="570" y="90" font-family="'Courier New',monospace" font-size="8" fill="#ff9d5c" text-anchor="middle">alert sent · next step</text>

  <!-- COLD branch -->
  <line x1="488" y1="104" x2="510" y2="104" stroke="#2a4a2a" stroke-width="1.5"/>
  <polyline points="505,100 511,104 505,108" fill="none" stroke="#2a4a2a" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="490" y="120" font-family="'Courier New',monospace" font-size="7" fill="#2a4a2a">COLD</text>

  <!-- IGNORED -->
  <rect x="512" y="88" width="116" height="34" rx="4" fill="#0d150d" stroke="#2a4a2a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="570" y="109" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#2a4a2a" text-anchor="middle">IGNORED</text>
  <text x="570" y="138" font-family="'Courier New',monospace" font-size="8" fill="#1a3a1a" text-anchor="middle">WARM / COLD</text>

  <!-- corner tag -->
  <text x="776" y="152" font-family="'Courier New',monospace" font-size="8" fill="#1a2a1a" text-anchor="end">state_flow_v2.svg</text>
</svg>

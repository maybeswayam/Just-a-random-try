<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>WhatsApp Real Estate Outreach Bot</title>

  <rect width="800" height="120" fill="#0d1117" rx="12"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="120" fill="url(#grid)" rx="12" opacity="0.6"/>

  <!-- Glow circle behind icon -->
  <circle cx="400" cy="60" r="80" fill="#25D366" opacity="0.04"/>
  <circle cx="400" cy="60" r="50" fill="#25D366" opacity="0.05"/>

  <!-- WA icon large -->
  <circle cx="290" cy="60" r="28" fill="none" stroke="#25D366" stroke-width="2"/>
  <path d="M276 60 Q276 46 290 46 Q304 46 304 60 Q304 70 297 74 L290 76 L283 78 L285 74 Q276 70 276 60Z" fill="none" stroke="#25D366" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="332" y="52" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="#e6edf3">WhatsApp Outreach Bot</text>
  <text x="332" y="76" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#8b949e">Real estate lead automation with AI scoring</text>

  <!-- Accent dots -->
  <circle cx="332" cy="96" r="3" fill="#25D366" opacity="0.8"/>
  <circle cx="342" cy="96" r="3" fill="#58a6ff" opacity="0.8"/>
  <circle cx="352" cy="96" r="3" fill="#d2a8ff" opacity="0.8"/>
  <circle cx="362" cy="96" r="3" fill="#e3b341" opacity="0.8"/>
  <circle cx="372" cy="96" r="3" fill="#f0883e" opacity="0.8"/>
  <circle cx="382" cy="96" r="3" fill="#f85149" opacity="0.8"/>
</svg>
